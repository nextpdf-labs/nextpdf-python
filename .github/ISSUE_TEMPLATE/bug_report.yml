name: Bug Report
description: Report a bug in the nextpdf Python SDK
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill in the details below.

  - type: input
    id: version
    attributes:
      label: nextpdf version
      description: Output of `nextpdf version` or `python -c "import nextpdf; print(nextpdf.__version__)"`.
      placeholder: "0.3.0"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      description: Output of `python --version`.
      placeholder: "3.12.0"
    validations:
      required: true

  - type: dropdown
    id: backend
    attributes:
      label: Backend
      description: Which backend were you using?
      options:
        - Remote (NextPDF Connect server)
        - Local (pypdf)
        - Both
        - Not sure
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug. Include the error message or traceback if applicable.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal code or CLI command to reproduce the issue.
      render: python
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Ubuntu 22.04 / Windows 11 / macOS 14"
    validations:
      required: false
